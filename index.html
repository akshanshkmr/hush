<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hush" />
<meta name="theme-color" content="#000000" />
<title>Hush</title>
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root{
    --bg:#000000;--card:#1C1C1E;--card2:#2C2C2E;
    --label:#FFFFFF;--label2:rgba(235,235,245,.6);--label3:rgba(235,235,245,.3);
    --sep:rgba(84,84,88,.55);--fill:rgba(120,120,128,.32);--fill2:rgba(120,120,128,.2);
    --tint:#FF9F0A;--seg-knob:#636366;--chrome:rgba(30,30,32,.72);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  input{user-select:text;-webkit-user-select:text;}
  button:focus-visible{outline:2px solid var(--tint);outline-offset:2px;}
  html,body{height:100%;margin:0;}
  body{font:16px/1.3 -apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
    color:var(--label);background:var(--bg);height:100svh;display:flex;flex-direction:column;
    overflow:hidden;user-select:none;-webkit-user-select:none;
    -webkit-font-smoothing:antialiased;}

  /* ambient wash — blends the colors of whatever's playing */
  #ambient{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .9s ease,background .9s ease;}
  header,.content{position:relative;z-index:1;}

  /* nav / large title */
  header{padding:calc(env(safe-area-inset-top) + 8px) 20px 6px;}
  .titlerow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .largetitle{font-family:ui-serif,"New York",Georgia,serif;font-style:italic;font-size:38px;font-weight:600;letter-spacing:.2px;margin:0;line-height:1.05;}
  .navbtns{display:flex;gap:2px;margin-bottom:3px;}
  .navbtn{width:44px;height:44px;border:none;background:none;color:var(--tint);display:grid;place-items:center;cursor:pointer;border-radius:50%;}
  .navbtn:active{background:var(--fill2);}
  .navbtn svg{width:23px;height:23px;}
  .navbtn:focus-visible{outline:2px solid var(--tint);outline-offset:-2px;}
  .subtitle{font-size:15px;color:var(--label2);margin-top:3px;}
  body.playing .subtitle::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--tint);margin-right:7px;animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  /* scroll content */
  .content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:14px 16px calc(env(safe-area-inset-bottom) + 124px);}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
  .cell{position:relative;overflow:hidden;appearance:none;cursor:pointer;border:none;font-family:inherit;
    aspect-ratio:1/.92;background:color-mix(in srgb,var(--c,#888) 7%,var(--card));border-radius:20px;color:var(--label2);
    box-shadow:inset 0 0 0 .5px rgba(255,255,255,.045);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
    touch-action:pan-y;transition:background .2s,color .2s,transform .15s,box-shadow .25s;}
  .cell:active{transform:scale(.96);}
  .cell svg{width:27px;height:27px;color:color-mix(in srgb, var(--c,var(--label2)) 75%, var(--label2));}
  .cell .name{font-size:13px;font-weight:500;letter-spacing:-.1px;}
  .cell svg,.cell .name{position:relative;}
  .cell::before{content:"";position:absolute;left:0;top:0;bottom:0;width:var(--lvl,60%);
    background:linear-gradient(90deg,rgba(255,255,255,.26),rgba(255,255,255,.10));
    opacity:0;transition:width .1s linear,opacity .25s;}
  .cell[aria-pressed="true"]{color:#fff;
    background:linear-gradient(157deg, color-mix(in srgb,var(--c) 76%, #fff), var(--c));
    box-shadow:0 12px 28px -12px color-mix(in srgb,var(--c) 72%, transparent), inset 0 0 0 .5px rgba(255,255,255,.16);}
  .cell[aria-pressed="true"] svg{color:#fff;}
  .cell[aria-pressed="true"]::before{opacity:1;}
  .cell:focus-visible{outline:2px solid var(--tint);outline-offset:2px;}

  /* grouped section */
  .group{margin-top:26px;}
  .grouphdr{font-size:13px;color:var(--label2);text-transform:uppercase;letter-spacing:.5px;padding:0 6px 7px;}
  .groupftr{font-size:13px;color:var(--label2);padding:7px 6px 0;min-height:18px;}


  .linkbtn{appearance:none;border:none;background:none;color:var(--tint);font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;padding:11px 6px;min-height:44px;}

  .card{background:var(--card);border-radius:12px;margin-top:12px;overflow:hidden;}
  .listrow{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;min-height:48px;font-size:16px;}
  .listrow + .listrow{border-top:.5px solid var(--sep);}

  /* iOS switch */
  .switch{position:relative;width:51px;height:31px;border-radius:31px;border:none;background:var(--fill);cursor:pointer;
    transition:background .25s;flex:0 0 auto;padding:0;}
  .switch .knob{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;
    box-shadow:0 3px 8px rgba(0,0,0,.18),0 1px 1px rgba(0,0,0,.12);transition:transform .25s cubic-bezier(.3,1.4,.5,1);}
  .switch[aria-checked="true"]{background:#34C759;}
  .switch[aria-checked="true"] .knob{transform:translateX(20px);}
  .switch:focus-visible{outline:2px solid var(--tint);outline-offset:2px;}

  /* bottom chrome bar */
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:5;
    background:var(--chrome);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border-top:.5px solid var(--sep);
    padding:11px 18px calc(env(safe-area-inset-bottom) + 11px);
    display:flex;align-items:center;gap:14px;}
  .playbtn{flex:0 0 auto;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle at 35% 30%,#ffc76a,var(--tint) 75%);
    box-shadow:0 6px 22px -8px rgba(255,159,10,.55);
    display:grid;place-items:center;transition:transform .15s,opacity .2s;}
  .playbtn:active{transform:scale(.93);}
  .playbtn:disabled{opacity:.35;cursor:default;}
  .playbtn svg{width:24px;height:24px;fill:#fff;}
  .playbtn:focus-visible{outline:2px solid var(--tint);outline-offset:3px;}
  .i-pause{display:none;}
  body.playing .i-play{display:none;}body.playing .i-pause{display:block;}
  .spk{color:var(--label3);display:grid;place-items:center;flex:0 0 auto;}
  .spk svg{width:18px;height:18px;}

  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:30px;background:transparent;cursor:pointer;}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--tint) var(--p,60%),var(--fill) var(--p,60%));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:27px;height:27px;border-radius:50%;margin-top:-11.5px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3),0 0 .5px rgba(0,0,0,.2);}
  input[type=range]::-moz-range-track{height:4px;border-radius:4px;background:var(--fill);}
  input[type=range]::-moz-range-thumb{width:27px;height:27px;border:none;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);}

  /* presets sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.3s;z-index:10;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:11;transform:translateY(110%);transition:transform .4s cubic-bezier(.32,.72,0,1);
    background:var(--card);border-radius:14px 14px 0 0;padding:8px 16px calc(env(safe-area-inset-bottom) + 18px);
    max-width:520px;margin:0 auto;box-shadow:0 -8px 40px rgba(0,0,0,.3);}
  .sheet.open{transform:none;}
  .grabber{width:36px;height:5px;border-radius:3px;background:var(--label3);margin:6px auto 12px;}
  .sheet h2{font-size:20px;font-weight:700;margin:0 0 14px;}
  .saverow{display:flex;gap:10px;margin-bottom:18px;}
  .saverow input{flex:1;background:var(--card);border:none;border-radius:11px;color:var(--label);padding:13px 14px;font-family:inherit;font-size:16px;min-height:46px;}
  .saverow input:focus{outline:2px solid var(--tint);}
  .savebtn{appearance:none;border:none;border-radius:11px;background:var(--tint);color:#fff;font-family:inherit;font-weight:600;font-size:16px;padding:0 18px;min-height:46px;cursor:pointer;}
  .empty{color:var(--label2);font-size:15px;text-align:center;padding:24px;}

  /* tabs + mixes page */
  .tabs{display:flex;gap:24px;margin-top:14px;}
  .tabs button{appearance:none;background:none;border:none;padding:7px 2px;font-family:inherit;font-size:15px;font-weight:600;
    color:var(--label2);position:relative;cursor:pointer;transition:color .2s;}
  .tabs button[aria-pressed="true"]{color:var(--label);}
  .tabs button[aria-pressed="true"]::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2.5px;border-radius:2px;background:var(--tint);}
  #mixctl{display:none;margin-bottom:14px;}
  body.playing #mixctl{display:block;}
  .view{display:none;}
  .view.on{display:block;}
  .mixitem{position:relative;overflow:hidden;border-radius:14px;background:var(--card);}
  .mixitem + .mixitem{margin-top:10px;}
  .mixrow{position:relative;display:flex;align-items:center;gap:10px;background:var(--card);
    padding:14px 14px 14px 16px;touch-action:pan-y;}
  .mixacts{position:absolute;top:0;bottom:0;right:0;display:flex;}
  .mixacts button{width:72px;border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .mixacts .mshare{background:#3478F6;}
  .mixacts .mdel{background:#FF453A;}
  .mixmain{flex:1;min-width:0;cursor:pointer;}
  .mixname{font-family:ui-serif,"New York",Georgia,serif;font-size:18px;font-weight:600;}
  .mixdots{display:flex;align-items:center;gap:5px;margin-top:7px;}
  .mixdots i{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .mixdots span{font-size:13px;color:var(--label2);margin-left:4px;}
  .mixplay{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;flex:0 0 auto;display:grid;place-items:center;
    background:color-mix(in srgb,var(--tint) 18%, transparent);color:var(--tint);}
  .mixplay svg{width:18px;height:18px;fill:currentColor;}

  /* breathing */
  .breath{position:fixed;inset:0;z-index:12;display:none;flex-direction:column;align-items:center;justify-content:center;gap:36px;
    background:rgba(0,0,0,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
  .breath.open{display:flex;}
  .bcircle{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 40% 33%,#ffd99a,var(--tint) 70%);
    box-shadow:0 0 80px 10px rgba(255,159,10,.4);transform:scale(.55);}
  .blabel{font-family:ui-serif,"New York",Georgia,serif;font-style:italic;font-size:24px;font-weight:500;color:#fff;letter-spacing:.3px;}
  .bclose{position:absolute;top:calc(env(safe-area-inset-top) + 14px);right:16px;width:44px;height:44px;background:rgba(120,120,128,.4);
    border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:grid;place-items:center;}

  .cell .pct{position:absolute;top:9px;left:0;right:0;text-align:center;font-size:12px;font-weight:700;color:#fff;opacity:0;transition:opacity .15s;}
  .cell.adjusting{transform:scale(1.06);z-index:2;box-shadow:0 12px 30px rgba(0,0,0,.4);touch-action:none;}
  .cell.adjusting .pct{opacity:1;}
  .navbtn{position:relative;}
  .navbtn.on::after{content:"";position:absolute;bottom:6px;right:9px;width:5px;height:5px;border-radius:50%;background:var(--tint);}
  .sellist{display:flex;flex-direction:column;background:var(--bg);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .selrow{display:flex;align-items:center;justify-content:space-between;padding:0 16px;min-height:50px;font-size:16px;cursor:pointer;}
  .selrow + .selrow{border-top:.5px solid var(--sep);}
  .selrow .ck{color:var(--tint);opacity:0;display:grid;place-items:center;}
  .selrow .ck svg{width:18px;height:18px;}
  .selrow[aria-selected="true"] .ck{opacity:1;}
  .dockmid{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
  .volrow{display:flex;align-items:center;gap:9px;}
  .volrow .spk svg{width:15px;height:15px;}
  .docktitle{font-size:13px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;padding:0 2px;}
  body:not(.playing) .docktitle{color:var(--label2);font-weight:500;}
  #btnInstall{display:none;}
  #btnInstall.show{display:grid;}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 96px);transform:translate(-50%,10px);
    background:rgba(50,50,52,.96);color:#fff;font-size:14px;font-weight:500;padding:11px 18px;border-radius:22px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:20;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translate(-50%,0);}
  .grabber{cursor:grab;}
  /* tablet / desktop */
  @media (min-width:640px){
    header,.content{width:100%;max-width:760px;margin:0 auto;}
    .grid{grid-template-columns:repeat(4,1fr);gap:12px;}
  }
  @media (min-width:760px){
    .dock{left:50%;right:auto;transform:translateX(-50%);width:min(720px,calc(100vw - 48px));
      bottom:18px;border-radius:22px;border:.5px solid var(--sep);
      padding:12px 18px;box-shadow:0 12px 40px rgba(0,0,0,.5);}
  }
  @media (hover:hover){
    .cell:hover{filter:brightness(1.15);}
    .navbtn:hover{background:var(--fill2);}
    .mixrow:hover{background:color-mix(in srgb,#fff 4%,var(--card));}
    .mixplay:hover{background:color-mix(in srgb,var(--tint) 30%,transparent);}
    .tabs button:hover{color:var(--label);}
    .selrow:hover{background:var(--fill2);}
  }
  @media (prefers-reduced-motion: reduce){.bcircle{transform:scale(.92) !important;}*{transition:none !important;animation:none !important;}}
</style>
</head>

<script>
(() => {
  "use strict";
  const mem={};
  const store={
    get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):(mem[k]??null);}catch(e){return mem[k]??null;}},
    set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;}}
  };

  const toastEl=document.getElementById("toast");let toastTO=null;
  function showToast(msg){toastEl.textContent=msg;toastEl.classList.add("show");
    if(toastTO)clearTimeout(toastTO);toastTO=setTimeout(()=>toastEl.classList.remove("show"),2200);}

  // debounced snapshot of the current mix so the app reopens where it left off
  let saveTO=null;
  function persistState(){clearTimeout(saveTO);saveTO=setTimeout(()=>{
    const snap={vol:userVol,name:mixName,layers:{}};
    SOUNDS.forEach(s=>{const L=layers[s.key];snap.layers[s.key]={active:L.active,level:L.level};});
    store.set("hush.last",snap);},250);}

  const ICONS={
    rain:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a4 4 0 0 1 .9-7.9 5 5 0 0 1 9.6-1.1A3.5 3.5 0 0 1 19 13"/><line x1="8" y1="17" x2="7" y2="20"/><line x1="12.5" y1="17" x2="11.5" y2="20"/><line x1="17" y1="17" x2="16" y2="20"/></svg>',

  function reconcile(){

      const should=playing&&L.active;
      if(should&&!L.stop){L.stop=ENGINES[key](L.gain);ramp(L.gain.gain,L.level,0.6);}
      else if(should&&L.stop){ramp(L.gain.gain,L.level,0.25);}

  function wireCell(s,t){
    // Tap toggles. Horizontal drag sets level — tiles are touch-action:pan-y so
    // the browser keeps vertical scroll and leaves horizontal to us: no conflict,
    // no long-press. dx maps 1:1 to the tile width (full swipe = full range).
    let start=null,mode=null,anchorX=0,baseLvl=0,pid=null;
    const TH=6;
    function endAdjust(){if(mode==="adj"){t.classList.remove("adjusting");try{t.releasePointerCapture(pid);}catch(e){}}}
    t.addEventListener("pointerdown",e=>{start={x:e.clientX,y:e.clientY,t:Date.now()};mode=null;pid=e.pointerId;});
    t.addEventListener("pointermove",e=>{if(!start)return;const dx=e.clientX-start.x,dy=e.clientY-start.y;
      if(mode==="adj"){e.preventDefault();const w=t.getBoundingClientRect().width;setLevel(s.key,baseLvl+(e.clientX-anchorX)/w);return;}
      if(mode===null&&Math.abs(dx)>TH&&Math.abs(dx)>Math.abs(dy)){
        mode="adj";if(!layers[s.key].active)toggle(s.key);
        baseLvl=layers[s.key].level;anchorX=e.clientX;
        t.classList.add("adjusting");try{t.setPointerCapture(pid);}catch(e){}
      }else if(Math.abs(dy)>TH){mode="scroll";}});
    const end=()=>{if(mode==="adj"){endAdjust();}else if(mode===null&&start&&Date.now()-start.t<500){toggle(s.key);}start=null;mode=null;};
    t.addEventListener("pointerup",end);
    t.addEventListener("pointercancel",()=>{endAdjust();start=null;mode=null;});
    t.addEventListener("keydown",e=>{
      if(e.key==="ArrowRight"||e.key==="ArrowUp"){e.preventDefault();setLevel(s.key,layers[s.key].level+0.1);}
      else if(e.key==="ArrowLeft"||e.key==="ArrowDown"){e.preventDefault();setLevel(s.key,layers[s.key].level-0.1);}
      else if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle(s.key);}});
  }

    if(ctx&&ctx.state==="suspended"&&playing) ctx.resume();
    if(streamOut&&streamOut.paused&&playing) streamOut.play().catch(()=>{});
    try{const _ka=document.getElementById("silentkeepalive");if(_ka&&_ka.paused)_ka.play().catch(()=>{});}catch(e){}
  });

  // --- restore last session (paused), then let a shared-mix link override it ---
  timerMin=store.get("hush.timerMin")||0;
  pendingEndsAt=store.get("hush.timerEndsAt")||0;if(pendingEndsAt<=Date.now())pendingEndsAt=0;
  (function restoreLast(){const p=store.get("hush.last");if(!p||!p.layers)return;
    if(typeof p.vol==="number"){userVol=p.vol;vol.value=Math.round(userVol*100);vol.style.setProperty("--p",(userVol*100)+"%");}
    mixName=p.name||null;
    SOUNDS.forEach(s=>{const d=p.layers[s.key];if(!d)return;const L=layers[s.key];
      L.active=!!d.active;L.tile.setAttribute("aria-pressed",L.active?"true":"false");setLevel(s.key,d.level??.6);});
    renderStatus();updateAmbient();})();
  let sharedMix=false;
  (function fromHash(){if(location.hash.length<2)return;
    try{const p=new URLSearchParams(location.hash.slice(1));
      if(!SOUNDS.some(s=>p.has(s.key)))return;
      sharedMix=true;
      SOUNDS.forEach(s=>{const L=layers[s.key];const has=p.has(s.key);
        L.active=has;L.tile.setAttribute("aria-pressed",has?"true":"false");
        if(has)setLevel(s.key,Math.min(100,Math.max(0,parseInt(p.get(s.key),10)||60))/100);else setLevel(s.key,L.level);});
      if(p.has("v")){userVol=Math.min(100,Math.max(0,parseInt(p.get("v"),10)||60))/100;vol.value=Math.round(userVol*100);vol.style.setProperty("--p",(userVol*100)+"%");}
      mixName=p.get("n")||null;
      history.replaceState(null,"",location.pathname+location.search);
      renderStatus();updateAmbient();persistState();showToast("Mix loaded — tap play");}catch(e){}})();
  // start on Mixes when there are saved mixes; a shared link shows its sounds instead
  setTab(sharedMix?"sounds":(getPresets().length?"mixes":"sounds"));

  // --- offline app shell ---
  if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}

  // --- install (download icon; hidden in standalone/PWA mode) ---
  const btnInstall=document.getElementById("btnInstall");
  const standalone=matchMedia("(display-mode: standalone)").matches||navigator.standalone===true;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  let deferredPrompt=null;
  const showInstall=()=>{if(!standalone)btnInstall.classList.add("show");};
  const hideInstall=()=>btnInstall.classList.remove("show");
  // Android / Chromium: capture the real install prompt for one-tap install
  window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;showInstall();});
  window.addEventListener("appinstalled",()=>{hideInstall();deferredPrompt=null;});
  btnInstall.addEventListener("click",async()=>{
    if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;hideInstall();}
    else if(isIOS){showToast("Tap the Share icon, then “Add to Home Screen”");}
    else{showToast("Use your browser menu → Install");}});
  // iOS has no beforeinstallprompt — show the icon and give instructions on tap
  if(isIOS&&!standalone)showInstall();
})();
</script>
</body>
